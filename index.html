<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFmask Picker</title>
  </head>
  <body>
    <div id="app">
      <!-- Upload overlay -->
      <div id="upload-overlay">
        <div class="upload-box" id="upload-box">
          <h2>上传视频</h2>
          <p>拖拽文件到此处，或点击选择</p>
          <p style="margin-top:0.5rem;font-size:14px;color:#666">支持 mp4、webm、ogg 等浏览器原生格式</p>
          <input type="file" id="file-input" accept="video/*" style="display:none" />
        </div>
      </div>

      <!-- Toolbar (hidden until video loaded) -->
      <div id="toolbar" style="display:none">
        <!-- Upload -->
        <div class="toolbar-group">
          <button id="btn-upload">上传</button>
        </div>
        <div class="toolbar-sep"></div>

        <!-- Frame navigation -->
        <div class="toolbar-group" style="flex:1;min-width:0">
          <button id="btn-play" title="播放/暂停">▶</button>
          <span id="frame-display">0:00 / 0:00</span>
          <input type="range" id="frame-slider" min="0" max="100" value="0" />
          <select id="speed-select" title="播放倍速">
            <option value="0.25">0.25x</option>
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </div>
        <div class="toolbar-sep"></div>

        <!-- Reset canvas -->
        <div class="toolbar-group">
          <button id="btn-reset" title="复位画布缩放/位置">⟲</button>
        </div>
        <div class="toolbar-sep"></div>

        <!-- Mode -->
        <div class="toolbar-group">
          <button id="btn-mode-draw" class="active">✦ 绘制</button>
          <button id="btn-mode-select">◇ 选择</button>
        </div>
        <div class="toolbar-sep"></div>

        <!-- Color -->
        <div class="toolbar-group" style="position:relative">
          <button id="btn-color" title="矩形颜色">
            <span id="color-preview" style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#ff4444;vertical-align:middle;border:1px solid #fff"></span>
            ▾
          </button>
          <div class="color-dropdown" id="color-dropdown">
            <div class="color-presets">
              <div class="color-preset" data-color="black" style="background:#000" title="black"></div>
              <div class="color-preset" data-color="white" style="background:#fff" title="white"></div>
              <div class="color-preset active" data-color="red" style="background:#ff4444" title="red"></div>
              <div class="color-preset" data-color="green" style="background:#44cc44" title="green"></div>
              <div class="color-preset" data-color="blue" style="background:#4488ff" title="blue"></div>
              <div class="color-preset" data-color="yellow" style="background:#ffff00" title="yellow"></div>
              <div class="color-preset" data-color="cyan" style="background:#00ffff" title="cyan"></div>
              <div class="color-preset" data-color="magenta" style="background:#ff00ff" title="magenta"></div>
              <div class="color-preset" data-color="orange" style="background:#ff8800" title="orange"></div>
            </div>
            <div class="color-custom">
              <label>自定义:</label>
              <input type="color" id="custom-color" value="#ff4444" />
            </div>
          </div>
        </div>
        <div class="toolbar-sep"></div>

        <!-- Actions -->
        <div class="toolbar-group">
          <button id="btn-undo" title="撤销 (Ctrl+Z)">↩</button>
          <button id="btn-redo" title="重做 (Ctrl+Shift+Z)">↪</button>
        </div>
        <div class="toolbar-group">
          <button id="btn-import" title="导入 JSON 配置">导入</button>
        </div>
        <input type="file" id="import-input" accept=".json" style="display:none" />
        <button id="btn-drawer-toggle" title="展开/折叠面板">☰</button>
      </div>

      <!-- Main area -->
      <div id="main-area" style="display:none">
        <div id="canvas-container">
          <canvas id="main-canvas"></canvas>
          <canvas id="minimap" width="120" height="80"></canvas>
        </div>
        <div id="drawer">
          <div class="drawer-header">
            <span>矩形</span>
            <button class="close-btn" id="drawer-close">✕</button>
          </div>
          <div class="drawer-content">
            <div class="rect-list" id="rect-list"></div>
            <div class="props-panel" id="props-panel" style="display:none">
              <div class="props-title">属性</div>
              <div class="props-grid">
                <label>X</label><input type="number" id="prop-x" />
                <label>Y</label><input type="number" id="prop-y" />
                <label>宽</label><input type="number" id="prop-w" />
                <label>高</label><input type="number" id="prop-h" />
                <label>颜色</label>
                <div class="color-options">
                  <div class="color-option" data-color="black" style="background:#000"></div>
                  <div class="color-option" data-color="white" style="background:#fff"></div>
                  <div class="color-option" data-color="red" style="background:#ff4444"></div>
                  <div class="color-option" data-color="green" style="background:#44cc44"></div>
                  <div class="color-option" data-color="blue" style="background:#4488ff"></div>
                  <div class="color-option" data-color="yellow" style="background:#ffff00"></div>
                  <div class="color-option" data-color="cyan" style="background:#00ffff"></div>
                  <div class="color-option" data-color="magenta" style="background:#ff00ff"></div>
                  <div class="color-option" data-color="orange" style="background:#ff8800"></div>
                  <input type="color" id="prop-custom-color" value="#ff4444" title="自定义颜色" />
                </div>
                <label>透明度</label>
                <div class="slider-wrapper">
                  <input type="range" id="prop-opacity" min="0" max="1" step="0.05" style="flex:1" />
                  <span id="prop-opacity-val" style="font-size:14px;color:#aaa;min-width:28px">1</span>
                </div>
                <label>粗细</label>
                <div style="display:flex;align-items:center;gap:6px">
                  <input type="number" id="prop-thickness" min="1" max="20" style="flex:1" />
                  <label style="display:flex;align-items:center;gap:3px;font-size:14px;color:#aaa;white-space:nowrap">
                    <input type="checkbox" id="prop-filled" checked /> 填充
                  </label>
                </div>
              </div>
              <div class="time-range-toggle">
                <input type="checkbox" id="prop-time-enabled" />
                <label for="prop-time-enabled">时间范围</label>
              </div>
              <div class="time-range-fields" id="time-range-fields" style="display:none">
                <label>开始</label><input type="text" id="prop-time-start" placeholder="HH:MM:SS" />
                <label>结束</label><input type="text" id="prop-time-end" placeholder="HH:MM:SS" />
              </div>
            </div>
          </div>
          <div class="export-area">
            <button id="export-current-side">📋 复制当前矩形参数</button>
            <button id="export-all-side">📋 复制全部矩形参数</button>
            <button id="export-json-side">💾 导出 JSON 配置文件</button>
          </div>
        </div>
      </div>

      <!-- Toast -->
      <div class="toast" id="toast"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
